<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Placeholder para o Gopher do Go -->
  <!-- Substitua este arquivo pelo logo real gerado via Google Nano Banana -->

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#00ACD7" opacity="0.1" stroke="#00ACD7" stroke-width="2"/>

  <!-- Simple gopher silhouette placeholder -->
  <g transform="translate(128, 128)">
    <!-- Head -->
    <circle cx="0" cy="-20" r="30" fill="#00ACD7"/>

    <!-- Ears -->
    <circle cx="-20" cy="-45" r="12" fill="#00ACD7"/>
    <circle cx="20" cy="-45" r="12" fill="#00ACD7"/>

    <!-- Body -->
    <ellipse cx="0" cy="20" rx="25" ry="35" fill="#00ACD7"/>

    <!-- Front paws -->
    <rect x="-15" y="40" width="8" height="25" rx="4" fill="#00ACD7"/>
    <rect x="7" y="40" width="8" height="25" rx="4" fill="#00ACD7"/>

    <!-- Eyes -->
    <circle cx="-12" cy="-25" r="4" fill="white"/>
    <circle cx="12" cy="-25" r="4" fill="white"/>

    <!-- Text placeholder -->
    <text x="0" y="85" font-size="14" font-weight="bold" text-anchor="middle" fill="#00ACD7">
      Go Gopher Logo
    </text>
  </g>
</svg>
