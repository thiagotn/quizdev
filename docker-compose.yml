services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quizdev
      POSTGRES_PASSWORD: quizdev
      POSTGRES_DB: quizdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizdev"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://quizdev:quizdev@db:5432/quizdev?sslmode=disable
      JWT_SECRET: change-me-in-production
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
